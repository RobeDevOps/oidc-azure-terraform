name: Terraform PR Plan

on:
  pull_request:
    branches:
      - main

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_ENV: dev  # Always preview with dev-like environment

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file="vars/${{ env.TF_ENV }}.tfvars" -out=tfplan

      - name: Comment Plan in PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('tfplan', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan (Environment: ${process.env.TF_ENV}) 🚀\n\`\`\`hcl\n${plan}\n\`\`\``
            });