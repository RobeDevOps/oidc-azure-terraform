name: Terraform Apply


on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      TF_ENV: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          federated-token: ${{ steps.auth.outputs.id_token }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file="vars/${{ env.TF_ENV }}.tfvars" -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file="vars/${{ env.TF_ENV }}.tfvars"